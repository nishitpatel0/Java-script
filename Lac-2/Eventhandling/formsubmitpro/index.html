    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: rgb(4, 100, 104);
        }

        #main {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: wheat;
        }

        input {
            display: block;
            font-size: 20px;
            background-color: thistle;
        }

        #card {
            margin-top: 20px;
            padding: 20px;
            border: 2px solid #124385;
            border-radius: 10px;

        }

        div#card h3 {
            font-size: 25px;
            color: #124385;
        }

        div#card h5 {
            margin: 2px;
            font-size: 20px;
            color: #124385;
        }

        div#card p { 
            font-size: 18px;
            color: #124385;
        }

        #profile {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        #profile img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

      
    </style>
</head>

    <div id="main">

            <input type="text" placeholder="Enter name">

            <input type="submit" value="Submit">
        </form>
