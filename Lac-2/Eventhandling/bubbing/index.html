<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body{
            position: relative;
            overflow: hidden;
            padding: 30px;
        }

        #main{
            width: 100%;
            height: 100%;
            background-color: #222;
        }

        #nav{
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: 100%;
            height: 100px;
            background-attachment: #444;
        }

        a{
            color: white !important;
        }

        button{
            padding: 12px 22px;
            background-color: red;
            border-radius: 5px;
            border: none;
            font-weight: 600;
            font-size: 20px;
        }

        .lt{
            text-decoration: line-through;
        }
    </style>

</head>
<body>

    <ul>
        <li>Apple</li>
        <li>Orange</li>
        <li>Banana</li>
        <li>Grape</li>
        <li>Strawberry</li>
    </ul>
    
    <script src="bubbling.js"></script>
</body>
</html>
